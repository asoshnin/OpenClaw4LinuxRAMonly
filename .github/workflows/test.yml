name: Tests
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v
        env:
          # Isolated clean workspace — no pre-existing DB or token files
          OPENCLAW_WORKSPACE: /tmp/openclaw-test-workspace
          # Obsidian key required at module import; tests mock it via conftest.py
          OBSIDIAN_API_KEY: test-ci-key
